<text x="700.0" y="75.0" fill="#4b5563" font-size="16" font-family="Inter, Arial, sans-serif" text-anchor="middle" font-weight="normal"><tspan x="700.0" dy="0.0" text-anchor="middle">Normalized overlap-add reconstructs perfectly in exact arithmetic whenever the squared-overlap denominator stays positive. The</tspan><tspan x="700.0" dy="20.0" text-anchor="middle">calmer question is different: how much tiny frame-coefficient noise gets amplified after normalization as the hop shrinks or grows?</tspan></text>
